<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faytek - Thomas</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --construction-yellow: #FFD700; --dark-grey: #333; --light-bg: #F4F4F4; --success-green: #2ecc71; --voice-blue: #3498db; }
        body { font-family: 'Roboto', sans-serif; margin: 0; background-color: var(--light-bg); color: var(--dark-grey); -webkit-tap-highlight-color: transparent;}
        header { background-color: white; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--construction-yellow); position: sticky; top: 0; z-index: 100; }
        .status-dot { height: 12px; width: 12px; background-color: #bbb; border-radius: 50%; }
        .status-dot.connected { background-color: var(--success-green); }
        main { padding: 15px; padding-bottom: 110px; }
        .btn-voice { width: 100%; background: white; border: 2px dashed var(--voice-blue); color: var(--voice-blue); padding: 18px; border-radius: 12px; font-weight: bold; font-size: 1rem; display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tabs-container { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; }
        .tab-btn { background: #e0e0e0; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--construction-yellow); color: var(--dark-grey); }
        .macro-box { background: var(--dark-grey); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .macro-box h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--construction-yellow); text-transform: uppercase; }
        .check-item { background: white; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; padding: 18px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .check-item input { transform: scale(1.8); margin-right: 18px; accent-color: var(--success-green); pointer-events: none;}
        .check-item.loaded { border-left: 6px solid var(--success-green); opacity: 0.7; }
        .check-item.loaded .item-text { text-decoration: line-through; }
        .item-text { flex-grow: 1; font-weight: 500; }
        .item-qty { font-weight: bold; background: #eee; padding: 5px 8px; border-radius: 4px; font-size: 0.9rem; }
        .action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; padding-bottom: max(15px, env(safe-area-inset-bottom)); }
        .btn-main { background-color: var(--construction-yellow); color: var(--dark-grey); border: none; padding: 16px; border-radius: 30px; font-weight: bold; width: 100%; max-width: 400px; display: none; text-transform: uppercase;}
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="logo.jpg" alt="Faytek" style="height: 38px; object-fit: contain;">
            <h1 style="margin: 0; font-size: 1.1rem;">Salut Thomas</h1>
        </div>
        <span id="status-dot" class="status-dot"></span>
    </header>

    <main>
        <button class="btn-voice" onclick="alert('🎙️ Dictée carnet de bord activée...')">🎤 Carnet de bord vocal</button>
        <div id="tabs-container" class="tabs-container"></div>
        <div id="content-area" style="display: none;">
            <div class="macro-box"><h3>Missions du jour :</h3><ul id="macro-tasks" style="margin:0; padding-left:20px;"></ul></div>
            <ul id="checklist-materiel"></ul>
        </div>
        <div id="empty-state" style="text-align: center; color: #888; margin-top: 60px;">
            <p style="font-size: 1.1rem;">Aucune mission reçue.<br>Bon café ! ☕</p>
        </div>
    </main>

    <div class="action-bar" id="action-bar">
        <span id="progress-text" style="font-weight: bold; margin-bottom: 5px;"></span>
        <button id="btn-valider" class="btn-main">Valider mon chargement</button>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        let planData = {}; let curDay = "";
        client.on('connect', () => { document.getElementById('status-dot').classList.add('connected'); client.subscribe('votre-entreprise/flotte/camion-1/journalier'); });

        client.on('message', (t, m) => {
            const d = JSON.parse(m.toString());
            if (!d.planning || Object.keys(d.planning).length === 0) { document.getElementById('empty-state').style.display = 'block'; document.getElementById('content-area').style.display = 'none'; document.getElementById('action-bar').style.display = 'none'; return; }
            planData = d.planning; curDay = Object.keys(planData)[0];
            document.getElementById('empty-state').style.display = 'none'; document.getElementById('content-area').style.display = 'block'; document.getElementById('action-bar').style.display = 'flex';
            render();
        });

        function render() {
            const tabs = document.getElementById('tabs-container'); tabs.innerHTML = '';
            Object.keys(planData).forEach(j => {
                const b = document.createElement('button'); b.className = `tab-btn ${j===curDay?'active':''}`; b.innerText = j;
                b.onclick = () => { curDay = j; render(); }; tabs.appendChild(b);
            });
            const tasks = document.getElementById('macro-tasks'); tasks.innerHTML = '';
            planData[curDay].taches.forEach(t => { tasks.innerHTML += `<li>${t}</li>`; });
            const list = document.getElementById('checklist-materiel'); list.innerHTML = '';
            planData[curDay].materiel.forEach((item, i) => {
                const li = document.createElement('li'); li.className = `check-item ${item.checked?'loaded':''}`;
                li.innerHTML = `<input type="checkbox" ${item.checked?'checked':''}> <span class="item-text">${item.nom}</span> <span class="item-qty">${item.quantite} ${item.unite}</span>`;
                li.onclick = () => { planData[curDay].materiel[i].checked = !planData[curDay].materiel[i].checked; render(); };
                list.appendChild(li);
            });
            const loaded = planData[curDay].materiel.filter(i => i.checked).length;
            const total = planData[curDay].materiel.length;
            document.getElementById('progress-text').innerText = `${loaded}/${total} articles chargés`;
            document.getElementById('btn-valider').style.display = (loaded === total && total > 0) ? 'block' : 'none';
        }
    </script>
</body>
</html>
